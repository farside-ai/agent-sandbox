# No User/Group drop: this throwaway, mount-less container runs the proxy as
# root so it works under `cap_drop: ALL` (which removes CAP_SETGID and would
# otherwise make tinyproxy fail to switch groups on startup).
Port 8888
Listen 0.0.0.0
Timeout 600

# Logging to stdout/stderr is handled by `-d`; keep it quiet-ish.
LogLevel Notice

# The proxy is only reachable on the internal Docker network (never published),
# so allow any client that can reach it. Containment is done by the filter below.
Allow 0.0.0.0/0

# Default-deny allowlist. Only hosts matching a pattern in `filter` are forwarded;
# everything else is refused. fnmatch = simple glob patterns on the hostname.
Filter "/etc/tinyproxy/filter"
FilterType fnmatch
FilterDefaultDeny Yes
FilterCaseSensitive Off

# Only allow CONNECT (HTTPS tunneling) to the standard TLS port. Without these
# lines tinyproxy would permit CONNECT to arbitrary ports.
ConnectPort 443
